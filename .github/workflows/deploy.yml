name: Deploy website via SFTP

on:
  push:
    branches:
      - main 

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: 📦 Prepare deploy folder
      run: |
        mkdir -p deploy
        cp app.R deploy/
        cp -r data deploy/

    - name: � Ensure remote directory exists
      run: |
        sudo apk add --no-cache sshpass || true
        sshpass -p "${{ secrets.FTP_PASSWORD }}" ssh -o StrictHostKeyChecking=no -p 22 ${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_SERVER }} "mkdir -p /apps/RVS_tool"

    - name: 📂 Sync files via SFTP (sshpass)
      run: |
        sudo apk add --no-cache sshpass || true
        sshpass -p "${{ secrets.FTP_PASSWORD }}" sftp -o StrictHostKeyChecking=no -P 22 ${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_SERVER }} <<'SFTP'
          put -r deploy/* /apps/RVS_tool/
          bye
        SFTP
